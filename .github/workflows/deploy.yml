name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean Droplet (PM2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            cd /opt/worxstream-agent || (mkdir -p /opt/worxstream-agent && cd /opt/worxstream-agent)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/UditShukla14/worxstreamAgent.git .
            fi
            npm ci --omit=dev
            pm2 restart mcp-backend --update-env || pm2 start ecosystem.config.cjs
            pm2 save
